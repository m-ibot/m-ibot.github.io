name: Deploy Website
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Build Website
        shell: bash
        env:
          DATO_CMS_API_KEY: ${{ secrets.DATO_CMS_API_KEY }}
        run: node build.js
      - name: Check for unreplaced placeholders
        run: |
          if grep -r -E "##[A-Z_]+##" dist/; then
            echo "Error: Unreplaced placeholders found in the dist folder!"
            exit 1
          else
            echo "All placeholders successfully replaced."
          fi
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
