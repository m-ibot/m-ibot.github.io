name: "Pull Requests checks"
on:
  pull_request:
permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: "Dependency Review"
        uses: actions/dependency-review-action@cc4f6536e38d1126c5e3b0683d469a14f23bfea4 # v3
  build-on-pullrequest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Build HTML
        env:
          DATO_CMS_API_KEY: ${{ secrets.DATO_CMS_API_KEY }}
        run: node build.js
      - name: Validate HTML
        run: |
          echo '{"extends":["html-validate:recommended"],"rules":{"prefer-native-element":"off","hidden-focusable":"off","no-trailing-whitespace":"off"}}' > .htmlvalidate.json
          npx -y html-validate dist/index.html dist/404.html
