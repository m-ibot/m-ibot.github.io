name: "Pull Requests checks"
on:
  pull_request:
permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "Dependency Review"
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
  build-on-pullrequest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Build HTML
        env:
          DATO_CMS_API_KEY: ${{ secrets.DATO_CMS_API_KEY }}
        run: node build.js
      - name: Check for unreplaced placeholders
        run: |
          if grep -r -E "##[A-Z_]+##" dist/; then
            echo "Error: Unreplaced placeholders found in the dist folder!"
            exit 1
          else
            echo "All placeholders successfully replaced."
          fi
      - name: Validate HTML
        run: |
          echo '{"extends":["html-validate:recommended"],"rules":{"prefer-native-element":"off","hidden-focusable":"off","no-trailing-whitespace":"off"}}' > .htmlvalidate.json
          npx -y html-validate dist/index.html dist/404.html
