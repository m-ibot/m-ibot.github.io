name: "Pull Requests checks"
on:
  pull_request:
permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v7
      - name: "Dependency Review"
        uses: actions/dependency-review-action@v5
  build-on-pullrequest:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Build HTML
        run: node build.js
      - name: Validate HTML
        run: |
          echo '{"extends":["html-validate:recommended"],"rules":{"prefer-native-element":"off","hidden-focusable":"off","no-trailing-whitespace":"off"}}' > .htmlvalidate.json
          npx -y html-validate dist/index.html
