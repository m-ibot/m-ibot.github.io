name: Lighthouse CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Build Project
        env:
          DATO_CMS_API_KEY: ${{ secrets.DATO_CMS_API_KEY }}
        run: node build.js

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false

      - name: Format and Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const results = ${{ steps.lighthouse.outputs.manifest }};
            
            let summary = '### ⚡️ Lighthouse Report\n\n';
            summary += '| URL | Performance | Accessibility | Best Practices | SEO |\n';
            summary += '| --- | :---: | :---: | :---: | :---: |\n';
            
            results.forEach((res) => {
              const url = res.url;
              const formatScore = (score) => {
                if (score >= 0.9) return `🟢 ${Math.round(score * 100)}`;
                if (score >= 0.5) return `🟠 ${Math.round(score * 100)}`;
                return `🔴 ${Math.round(score * 100)}`;
              };
              
              let path = '/';
              try { path = new URL(url).pathname; } catch (e) { path = url; }
              
              summary += `| ${path} | ${formatScore(res.summary.performance)} | ${formatScore(res.summary.accessibility)} | ${formatScore(res.summary['best-practices'])} | ${formatScore(res.summary.seo)} |\n`;
            });
            
            summary += '\n#### 🔍 Detailed Findings\n\n';
            try {
              const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
              files.forEach(file => {
                const data = JSON.parse(fs.readFileSync(`.lighthouseci/${file}`, 'utf8'));
                let path = '/';
                try { path = new URL(data.finalUrl).pathname; } catch (e) { path = data.finalUrl; }
                
                summary += `<details><summary>Findings for <b>${path}</b></summary>\n\n`;
                let hasFindings = false;
                for (const key in data.audits) {
                  const a = data.audits[key];
                  if (a.score !== null && a.score < 1 && a.scoreDisplayMode !== 'notApplicable' && a.scoreDisplayMode !== 'informative') {
                    summary += `- **${a.title}**: Score ${a.score}. ${a.displayValue ? a.displayValue : ''}\n`;
                    hasFindings = true;
                  }
                }
                if (!hasFindings) summary += '- No significant issues found! 🎉\n';
                summary += '</details>\n\n';
              });
              summary += '> *Full HTML reports are available as Workflow Artifacts on this run.*\n';
            } catch (err) {
              console.log('Could not parse detailed findings:', err);
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
